name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_ENV: test
  JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-key-12345' }}
  JWT_EXPIRE: 15m
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'test-refresh-secret-key-12345' }}
  JWT_REFRESH_EXPIRE: 7d
  PORT: 5000
  CLIENT_URL: http://localhost:5173
  MONGODB_URI: mongodb://localhost:27017/creator-platform-test
  CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME || 'test-cloud' }}
  CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY || 'test-key' }}
  CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET || 'test-secret' }}

jobs:
  setup-and-test:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Wait for MongoDB to be ready
        run: |
          for i in {1..30}; do
            if mongosh --host localhost:27017 --eval "db.adminCommand('ping')" > /dev/null 2>&1; then
              echo "MongoDB is ready"
              exit 0
            fi
            echo "Waiting for MongoDB... ($i/30)"
            sleep 1
          done
          echo "MongoDB failed to start"
          exit 1
        shell: bash

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        run: npm install --prefix server

      - name: Install client dependencies
        run: npm install --prefix client

      - name: Run server tests
        run: npm test --prefix server
        env:
          MONGODB_URI: mongodb://localhost:27017/creator-platform-test
          NODE_ENV: test

      - name: Run client tests
        run: npm test --prefix client -- --passWithNoTests
        env:
          NODE_ENV: test

      - name: Check test results
        if: success()
        run: echo "✅ All tests passed successfully!"

  deploy:
    runs-on: ubuntu-latest
    needs: setup-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm run install-all

      - name: Build application
        run: npm run build --prefix client
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.example.com' }}

      - name: Render Deployment (via Deploy Hook)
        if: ${{ secrets.RENDER_TOKEN != '' }}
        run: |
          curl -X POST "https://api.render.com/deploy/srv_${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_DEPLOY_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.RENDER_TOKEN }}" \
          -H "Content-Type: application/json"
        continue-on-error: true

      - name: Vercel Deployment (via CLI)
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: |
          npm install -g vercel
          vercel --prod \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --org ${{ secrets.VERCEL_ORG_ID }} \
            --project ${{ secrets.VERCEL_PROJECT_ID }}
        continue-on-error: true

      - name: Deployment Summary
        run: echo "✅ Deployment completed!"
