name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm run install-all

      - name: Run tests
        env:
          MONGODB_URI_TEST: "mongodb://localhost:27017/creator-platform-test"
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Render Deployment (via Deploy Hook)
        run: |
          curl -X POST "https://api.render.com/deploy/srv_<SERVICE_ID>?key=<DEPLOY_KEY>" \
          -H "Authorization: Bearer ${{ secrets.RENDER_TOKEN }}"

      - name: Vercel Deployment (via CLI)
        run: |
          npm install -g vercel
          vercel --prod --token ${{ secrets.VERCEL_TOKEN }} \
                 --org ${{ secrets.VERCEL_ORG_ID }} \
                 --project ${{ secrets.VERCEL_PROJECT_ID }}
