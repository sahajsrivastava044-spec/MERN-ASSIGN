name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm run install-all

      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Render Deployment (via Deploy Hook)
        run: |
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_<PROJECT_ID>/<DEPLOY_HOOK_ID>" \
          -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}"

      - name: Vercel Deployment (via CLI)
        run: |
          npm install -g vercel
          vercel --prod --token ${{ secrets.VERCEL_TOKEN }} \
                 --org ${{ secrets.VERCEL_ORG_ID }} \
                 --project ${{ secrets.VERCEL_PROJECT_ID }}